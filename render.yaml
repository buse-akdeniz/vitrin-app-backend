services:
  - type: web
    name: vitrin-app-backend
    env: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AWS_REGION
        value: eu-central-1
      - key: S3_RAW_BUCKET
        sync: false
      - key: CDN_BASE_URL
        sync: false
      - key: UPLOAD_API_TOKEN
        sync: false
      - key: AUTH_SALT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_MODEL
        value: gpt-4o-mini
      - key: DATA_DIR
        value: /opt/render/project/data
